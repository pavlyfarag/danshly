# ============================================================================
# danshly.com — nginx site configuration
#
# Topology:  Cloudflare (proxy, TLS to visitor)
#              └─> nginx  (this file; TLS via Cloudflare Origin CA,
#                          client cert verification via Authenticated
#                          Origin Pulls, edge rate limiting, static cache)
#                    └─> Next.js standalone server (127.0.0.1:3001)
#
# Install:   /etc/nginx/sites-available/danshly.com.conf
#            ln -s ../sites-available/danshly.com.conf sites-enabled/
#            nginx -t && systemctl reload nginx
#
# Cloudflare dashboard prerequisites:
#   - SSL/TLS mode: Full (strict)
#   - SSL/TLS > Origin Server: "Authenticated Origin Pulls" enabled
# ============================================================================

# --- Rate limiting zones (http context; site files are included there) -----
# Contact endpoint: tight. Everything else: generous, bursts absorbed.
limit_req_zone $binary_remote_addr zone=danshly_api:10m     rate=10r/m;
limit_req_zone $binary_remote_addr zone=danshly_general:10m rate=30r/s;

# --- Local cache for Next.js immutable build assets ------------------------
proxy_cache_path /var/cache/nginx/danshly
                 levels=1:2 keys_zone=danshly_static:10m
                 max_size=512m inactive=7d use_temp_path=off;

upstream danshly_app {
    server 127.0.0.1:3001;
    keepalive 32;
}

# --- Restore real visitor IPs from Cloudflare -------------------------------
# Keep in sync with https://www.cloudflare.com/ips/ (they change rarely).
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# --- Plain HTTP: redirect (Cloudflare normally handles this upstream) -------
server {
    listen 80;
    listen [::]:80;
    server_name danshly.com www.danshly.com;
    return 301 https://danshly.com$request_uri;
}

# --- Canonicalize www -> apex ------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.danshly.com;

    # Cloudflare Origin Certificate
    ssl_certificate /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-origin.key;
    include snippets/ssl-params.conf;

    # Verify requests come from Cloudflare (Authenticated Origin Pull)
    ssl_client_certificate /etc/nginx/ssl/cloudflare-authenticated-origin-pull.pem;
    ssl_verify_client on;
    return 301 https://danshly.com$request_uri;
}

# --- Main vhost ---------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name danshly.com;

    # Cloudflare Origin Certificate
    ssl_certificate /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-origin.key;
    include snippets/ssl-params.conf;

    # Verify requests come from Cloudflare (Authenticated Origin Pull)
    ssl_client_certificate /etc/nginx/ssl/cloudflare-authenticated-origin-pull.pem;
    ssl_verify_client on;

    server_tokens off;

    # The app only ever receives small JSON bodies (contact form).
    client_max_body_size 64k;

    # Compress text responses for any path nginx serves/caches itself;
    # dynamic responses arrive pre-compressed from Next.js and pass through.
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml image/svg+xml font/woff2;

    # Note on headers: HSTS, CSP (nonce-based), X-Frame-Options, etc. are set
    # by the application itself (next.config.ts + proxy.ts) so they stay in
    # lock-step with the code. Do not duplicate them here.

    # --- Immutable build assets: cache at the edge of the box ---------------
    location /_next/static/ {
        proxy_pass http://danshly_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        proxy_cache danshly_static;
        proxy_cache_valid 200 7d;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
        # Cache-Control: public, max-age=31536000, immutable comes from Next.
    }

    # --- Contact endpoint: strict edge rate limit ----------------------------
    location = /api/contact {
        limit_req zone=danshly_api burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://danshly_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- Everything else ------------------------------------------------------
    location / {
        limit_req zone=danshly_general burst=60 nodelay;

        proxy_pass http://danshly_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}
